<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>New Tab</title>
</head>

<body class="font-sans m-0 p-6 pb-16 bg-surface text-text leading-relaxed">
  <template id="bookmark-link-template">
    <img class="favicon shrink-0 size-4" alt="">
    <span class="min-w-0 leading-4"><a class="text-link no-underline hover:underline"></a> <span
        class="hostname text-hostname text-[0.85em]"></span></span>
  </template>

  <template id="tab-link-template">
    <img class="favicon shrink-0 size-4" alt="">
    <span class="min-w-0 leading-4"><a class="text-link no-underline hover:underline" href="#"></a> <span
        class="hostname text-hostname text-[0.85em]"></span></span>
  </template>

  <div id="layout-grid" class="grid grid-rows-[auto_1fr] gap-x-8">
    <h2 class="text-[1.1rem] font-semibold m-0 mb-3 text-heading uppercase tracking-wider">Bookmarks</h2>
    <h2 class="text-[1.1rem] font-semibold m-0 mb-3 text-heading uppercase tracking-wider">Open Tabs</h2>
    <div id="bookmarks-section" class="content-start"></div>
    <div id="tabs-section" class="content-start"></div>
  </div>
  <div id="settings-bar"
    class="fixed bottom-0 left-0 w-screen flex items-center justify-center gap-8 py-3 text-hostname text-sm bg-surface border-t border-hostname/10">
    <div class="flex items-center gap-3">
      <span>Theme</span>
      <label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="theme" value="system" checked>
        System</label>
      <label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="theme" value="light">
        Light</label>
      <label class="flex items-center gap-1.5 cursor-pointer"><input type="radio" name="theme" value="dark">
        Dark</label>
    </div>
    <div class="flex items-center gap-3">
      <label class="flex items-center gap-2">
        <span>Bookmark columns</span>
        <input type="range" name="bookmarkColumns" min="1" max="2" value="1">
        <span id="bookmarkColumns-value" class="w-4 text-center">1</span>
      </label>
    </div>
    <div class="flex items-center gap-3">
      <label class="flex items-center gap-2">
        <span>Tab columns</span>
        <input type="range" name="tabColumns" min="1" max="4" value="1">
        <span id="tabColumns-value" class="w-4 text-center">1</span>
      </label>
    </div>
    <button id="collapse-bookmarks" class="cursor-pointer bg-transparent border border-hostname/20 rounded px-2 py-0.5 text-hostname text-sm hover:bg-hostname/10">Collapse bookmarks</button>
    <button id="collapse-tabs" class="cursor-pointer bg-transparent border border-hostname/20 rounded px-2 py-0.5 text-hostname text-sm hover:bg-hostname/10">Collapse tabs</button>
  </div>

  <script src="newtab.js"></script>
</body>

</html>
