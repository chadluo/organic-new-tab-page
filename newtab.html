<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>New Tab</title>
</head>
<body>
  <template id="bookmark-link-template">
    <img class="favicon" width="16" height="16" alt="">
    <a target="_blank"></a>
    <span class="hostname"></span>
  </template>

  <template id="tab-link-template">
    <img class="favicon" width="16" height="16" alt="">
    <a href="#"></a>
    <span class="hostname"></span>
  </template>

  <div class="container">
    <div class="section">
      <h2>Bookmarks</h2>
      <div id="bookmarks"></div>
    </div>
    <div class="section">
      <h2>Open Tabs</h2>
      <div id="tabs"></div>
    </div>
  </div>
  <script src="newtab.js"></script>
</body>
</html>
