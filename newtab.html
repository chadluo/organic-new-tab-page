<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="styles.css">
  <title>New Tab</title>
</head>

<body class="font-sans m-0 p-6 bg-surface text-text leading-relaxed">
  <template id="bookmark-link-template">
    <img class="favicon shrink-0 size-4 mt-1" alt="">
    <span class="min-w-0"><a class="text-link no-underline hover:underline" target="_blank"></a> <span
        class="hostname text-hostname text-[0.85em]"></span></span>
  </template>

  <template id="tab-link-template">
    <img class="favicon shrink-0 size-4 mt-1" alt="">
    <span class="min-w-0"><a class="text-link no-underline hover:underline" href="#"></a> <span
        class="hostname text-hostname text-[0.85em]"></span></span>
  </template>

  <div id="layout-grid" class="grid gap-x-8">
    <div id="bookmarks-section" class="grid grid-cols-subgrid content-start pt-2">
      <h2 class="col-span-full text-[1.1rem] font-semibold m-0 mb-3 text-heading uppercase tracking-wider">Bookmarks
      </h2>
    </div>
    <div id="tabs-section" class="grid grid-cols-subgrid content-start pt-2">
      <h2 class="col-span-full text-[1.1rem] font-semibold m-0 mb-3 text-heading uppercase tracking-wider">Open Tabs
      </h2>
    </div>
  </div>
  <button id="settings-btn" title="Settings"
    class="block mx-auto mt-8 p-2 rounded-full cursor-pointer border-none text-hostname transition-[background] duration-150"
    style="background:color-mix(in srgb,var(--color-text) 10%,transparent);">
    <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor"
      stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="3" />
      <path
        d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 2.83-2.83l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 2.83l-.06.06A1.65 1.65 0 0 0 19.4 9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z" />
    </svg>
  </button>

  <dialog id="settings-dialog" class="rounded-lg p-8 border-none m-auto bg-surface text-text min-w-md">
    <button class="close-btn absolute top-3 right-3 p-1 rounded cursor-pointer border-none bg-transparent text-hostname"
      title="Close">&#x2715;</button>
    <h3 class="text-base font-semibold m-0 mb-6 text-heading">Settings</h3>
    <fieldset class="border-none p-0 m-0">
      <legend class="font-medium mb-3">Theme</legend>
      <div class="flex gap-4">
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="theme" value="system" checked>
          System</label>
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="theme" value="light">
          Light</label>
        <label class="flex items-center gap-2 cursor-pointer"><input type="radio" name="theme" value="dark">
          Dark</label>
      </div>
    </fieldset>
    <fieldset class="border-none p-0 m-0 mt-6">
      <legend class="font-medium mb-3">Layout</legend>
      <div class="flex flex-col gap-3">
        <label class="flex items-center gap-3">
          <span class="w-36">Bookmark columns</span>
          <input type="range" name="bookmarkColumns" min="1" max="2" value="1" class="flex-1">
          <span id="bookmarkColumns-value" class="w-4 text-center">1</span>
        </label>
        <label class="flex items-center gap-3">
          <span class="w-36">Tab columns</span>
          <input type="range" name="tabColumns" min="1" max="4" value="1" class="flex-1">
          <span id="tabColumns-value" class="w-4 text-center">1</span>
        </label>
      </div>
    </fieldset>
  </dialog>

  <script src="newtab.js"></script>
</body>

</html>
